publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.3
  path: ^1.9.0
  file_picker: ^8.0.3
